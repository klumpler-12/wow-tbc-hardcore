<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="295" font-family="'Russo One','Arial Black',sans-serif" font-size="150" letter-spacing="5" fill="#39ff14" filter="url(#greenGlow)">HYBRID</text>
  <text x="760" y="295" font-family="'Russo One','Arial Black',sans-serif" font-size="130" letter-spacing="5" fill="#ffffff">HC</text>
  <text x="85" y="370" font-family="'Inter',Arial,sans-serif" font-weight="400" font-size="33" letter-spacing="5">
    <tspan fill="rgba(138,135,127,0.55)">DESIGNED FOR </tspan><tspan fill="rgba(57,255,20,0.55)">THE BURNING CRUSADE</tspan>
  </text>
</svg>
